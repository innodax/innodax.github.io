<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Přihlášení – FokusRoll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="css/prihlaseni.css" />
</head>
<body>

  <div id="nav-placeholder"></div>

  <div class="login-wrap">
    <div class="login-box">
      <a href="index.html" class="login-logo">
        <div class="login-logo-icon">
          <img
            src="img/icon.png"
            alt=""
            onerror="this.style.display='none';this.parentElement.textContent='🎲'"
          />
        </div>
        <span class="login-logo-text">Fokus<span>Roll</span></span>
      </a>
      <h1>Přihlásit se</h1>
      <p class="subtitle">Zadejte své přihlašovací údaje.</p>

      <form class="login-form" onsubmit="return false">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="vas@email.cz" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label for="password">Heslo</label>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <div class="form-footer">
          <label style="display:flex;align-items:center;gap:6px;color:var(--light-gray);cursor:pointer">
            <input type="checkbox" name="remember" style="accent-color:var(--hot-orange)" /> Zapamatovat
          </label>
          <a href="#">Zapomenuté heslo?</a>
        </div>
        <button type="submit" class="login-submit">Přihlásit se</button>
      </form>

      <p class="login-register">Ještě nemáte účet? <a href="registrace.html">Registrujte se</a></p>
    </div>
  </div>

  <script src="nav.js"></script>
  <div id="footer-placeholder"></div>
  <script src="footer.js"></script>
</body>
</html>
